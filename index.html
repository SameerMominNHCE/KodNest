<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;

    }
    h1{
      color : red;
      font-size: large;
      background-color: mediumaquamarine;
    }
    h2{
      color : blue;
      font-size: medium;
      background-color: lightcoral; 
    }
    h3{
      color : green;
      font-size: small;
      background-color: lightsteelblue; 
    } 
    nav{
      background-color:lightcoral;
      color: rgb(26, 34, 188);
      padding: 10px;
    }
    nav ul{
      list-style-type: none;
    }
    nav ul li{
      display: inline;
      margin-right: 60px;
    }
      nav ul li a{
        color: white;
        text-decoration: none;
      }
       nav ul li a:hover{
        text-decoration: underline;
        color: lightsteelblue;
      }
      

  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <h1>Hello Love</h1>
  <h2>How Are You?</h2>
  <h3>What Are You Doing?</h3>
  
</body>
</html>
